name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-backend:
    name: Testes Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Configura JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Roda testes e empacota
        run: ./mvnw verify

  test-frontend:
    name: Testes Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Configura Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Instala dependências
        run: npm ci
      - name: Roda testes
        run: npm test
      - name: Build de produção
        run: npm run build -- --configuration=production

  deploy:
    name: Deploy para Produção
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Aciona deploy do backend (Render)
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
      - name: Aciona deploy do frontend (Netlify)
        run: curl -X POST "${{ secrets.NETLIFY_DEPLOY_HOOK_URL }}"
