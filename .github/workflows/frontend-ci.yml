name: Frontend CI (Angular)

on:
  push:
    branches: [ "develop", "main" ]
    paths:
      - 'frontend/**' # Só acorda se mexerem no frontend
  pull_request:
    branches: [ "develop", "main" ]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend # Importante: entra na pasta do Angular

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Dependencies
      run: npm ci # Instalação limpa e rápida para CI

    - name: Build Angular App
      # Compila em modo produção (verifica erros estritos)
      run: npm run build -- --configuration=production