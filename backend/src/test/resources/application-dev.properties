# Configuração do perfil dev para testes. Reproduz application-dev.properties mas
# sem classpath:db/seed no Flyway — V10 é seed de dados de dev, não deve ser exigido
# no banco de testes. Manter sincronizado com src/main/resources/application-dev.properties.

spring.datasource.url=jdbc:postgresql://localhost:5432/fintech
spring.datasource.username=admin
spring.datasource.password=secret

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%X{requestId:--}][%X{userId:--}] %logger{36} - %msg%n
logging.level.com.fintech=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN

api.security.token.secret=dev-secret-key-not-for-production

cors.allowed-origins=http://localhost:4200

spring.flyway.locations=classpath:db/migration
