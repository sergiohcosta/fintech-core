openapi: 3.0.3
info:
  title: Fintech SaaS API
  version: 1.0.0
  description: API de gestão financeira multi-tenant.

servers:
  - url: http://localhost:8080
    description: Desenvolvimento local

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # --- Enums ---

    TransactionType:
      type: string
      enum: [INCOME, EXPENSE]

    TransactionStatus:
      type: string
      enum: [PENDING, PAID, CANCELLED]

    InvoiceStatus:
      type: string
      enum: [OPEN, CLOSED, PAID]

    CardBrand:
      type: string
      enum: [VISA, MASTERCARD, ELO, AMEX, HIPERCARD, OTHER]

    # --- Auth ---

    LoginDTO:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    LoginResponseDTO:
      type: object
      properties:
        token:
          type: string

    TenantRegistrationDTO:
      type: object
      required: [name, adminName, adminEmail, password]
      properties:
        name:
          type: string
        document:
          type: string
          nullable: true
        adminName:
          type: string
        adminEmail:
          type: string
          format: email
        password:
          type: string

    RegisterResponseDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    # --- Categories ---

    CategoryCreateDTO:
      type: object
      required: [name, icon, color]
      properties:
        name:
          type: string
        icon:
          type: string
        color:
          type: string
        parentId:
          type: string
          format: uuid
          nullable: true

    CategoryResponseDTO:
      type: object
      required: [id, name, icon, color, archived, children]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        icon:
          type: string
        color:
          type: string
        parentId:
          type: string
          format: uuid
          nullable: true
        archived:
          type: boolean
        children:
          type: array
          items:
            $ref: '#/components/schemas/CategoryResponseDTO'

    CategoryArchiveRequest:
      type: object
      properties:
        targetCategoryId:
          type: string
          format: uuid
          nullable: true

    CategoryConflictResponse:
      type: object
      required: [transactionCount, message]
      properties:
        transactionCount:
          type: integer
          format: int64
        message:
          type: string

    # --- Transactions ---

    TransactionRequestDTO:
      type: object
      required: [description, amount, date, type, accountId]
      properties:
        description:
          type: string
        amount:
          type: number
          format: double
          minimum: 0.01
        date:
          type: string
          format: date
        type:
          $ref: '#/components/schemas/TransactionType'
        status:
          $ref: '#/components/schemas/TransactionStatus'
          nullable: true
        totalInstallments:
          type: integer
          nullable: true
        categoryId:
          type: string
          format: uuid
          nullable: true
        accountId:
          type: string
          format: uuid

    TransactionUpdateDTO:
      type: object
      properties:
        description:
          type: string
          nullable: true
        amount:
          type: number
          format: double
          minimum: 0.01
          nullable: true
        date:
          type: string
          format: date
          nullable: true
        type:
          $ref: '#/components/schemas/TransactionType'
          nullable: true
        status:
          $ref: '#/components/schemas/TransactionStatus'
          nullable: true
        categoryId:
          type: string
          format: uuid
          nullable: true
        accountId:
          type: string
          format: uuid
          nullable: true
        propagate:
          type: array
          items:
            type: string
          nullable: true

    TransactionResponseDTO:
      type: object
      required: [id, description, amount, date, type, status]
      properties:
        id:
          type: string
          format: uuid
        description:
          type: string
        amount:
          type: number
          format: double
        date:
          type: string
          format: date
        type:
          $ref: '#/components/schemas/TransactionType'
        status:
          $ref: '#/components/schemas/TransactionStatus'
        installmentLabel:
          type: string
          nullable: true
        categoryName:
          type: string
          nullable: true
        categoryId:
          type: string
          format: uuid
          nullable: true
        categoryArchived:
          type: boolean
        categoryPath:
          type: string
          nullable: true
        categoryIcon:
          type: string
          nullable: true
        accountName:
          type: string
          nullable: true
        accountId:
          type: string
          format: uuid
          nullable: true
        transferId:
          type: string
          format: uuid
          nullable: true
        installmentGroupId:
          type: string
          format: uuid
          nullable: true
        installmentGroupDescription:
          type: string
          nullable: true
        installmentNumber:
          type: integer
          nullable: true
        totalInstallments:
          type: integer
          nullable: true
        invoiceId:
          type: string
          format: uuid
          nullable: true
        invoiceDueDate:
          type: string
          format: date
          nullable: true
        invoiceStatus:
          $ref: '#/components/schemas/InvoiceStatus'
          nullable: true

    # --- Invoices ---

    InvoiceResponseDTO:
      type: object
      required: [id, accountId, accountName, referenceMonth, referenceYear, label, closingDate, dueDate, status, totalAmount, transactionCount]
      properties:
        id:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        accountName:
          type: string
        referenceMonth:
          type: integer
        referenceYear:
          type: integer
        label:
          type: string
          example: "Janeiro/2027"
        closingDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/InvoiceStatus'
        totalAmount:
          type: number
          format: double
        transactionCount:
          type: integer
          format: int64

    InvoicePayDTO:
      type: object
      required:
        - sourceAccountId
      properties:
        sourceAccountId:
          type: string
          format: uuid

    DeleteInstallmentScope:
      type: string
      enum: [SINGLE, THIS_AND_NEXT, ALL]
      default: SINGLE

    DeleteInstallmentResultDTO:
      type: object
      required: [deleted, skippedPaid]
      properties:
        deleted:
          type: integer
        skippedPaid:
          type: integer

    InstallmentGroupPatchDTO:
      type: object
      properties:
        description:
          type: string
          nullable: true
        categoryId:
          type: string
          format: uuid
          nullable: true
        accountId:
          type: string
          format: uuid
          nullable: true
        installmentAmount:
          type: number
          format: double
          nullable: true
        status:
          $ref: '#/components/schemas/TransactionStatus'
          nullable: true
        fields:
          type: array
          items:
            type: string

    InstallmentGroupResponseDTO:
      type: object
      required: [id, description, totalAmount, installmentAmount, totalInstallments, paidInstallments, pendingInstallments, accountName, transactions]
      properties:
        id:
          type: string
          format: uuid
        description:
          type: string
        totalAmount:
          type: number
          format: double
        installmentAmount:
          type: number
          format: double
        totalInstallments:
          type: integer
        paidInstallments:
          type: integer
          format: int64
        pendingInstallments:
          type: integer
          format: int64
        nextDueDate:
          type: string
          format: date
          nullable: true
        categoryName:
          type: string
          nullable: true
        categoryId:
          type: string
          format: uuid
          nullable: true
        accountName:
          type: string
        accountId:
          type: string
          format: uuid
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/TransactionResponseDTO'

    TransferRequest:
      type: object
      required: [fromAccountId, toAccountId, amount, date]
      properties:
        fromAccountId:
          type: string
          format: uuid
        toAccountId:
          type: string
          format: uuid
        amount:
          type: number
          format: double
          minimum: 0.01
        date:
          type: string
          format: date
        description:
          type: string
          nullable: true

    TransferResponse:
      type: object
      properties:
        transferId:
          type: string
          format: uuid
        fromLegId:
          type: string
          format: uuid
        toLegId:
          type: string
          format: uuid
        amount:
          type: number
          format: double
        date:
          type: string
          format: date
        description:
          type: string
        fromAccount:
          type: string
        toAccount:
          type: string

    # --- Dashboard ---

    DashboardSummaryDTO:
      type: object
      properties:
        period:
          type: string
          pattern: '^\d{4}-\d{2}$'
          example: "2026-05"
        totalIncome:
          type: number
          format: double
        totalExpense:
          type: number
          format: double
        balance:
          type: number
          format: double
        transactionCount:
          type: integer
          format: int64
          description: Quantidade de transações não canceladas no período. Zero indica mês sem movimentação.
        totalAccountBalance:
          type: number
          format: double
          description: Saldo líquido acumulado (todas as contas com countInLiquidBalance=true, sem filtro de período).

    # --- Accounts ---

    AccountType:
      type: string
      enum: [CHECKING, INVESTMENT, CREDIT_CARD, CASH]

    CreditCardDetailsRequest:
      type: object
      properties:
        brand:
          $ref: '#/components/schemas/CardBrand'
        lastFourDigits:
          type: string
          minLength: 4
          maxLength: 4
          nullable: true
        limitAmount:
          type: number
          format: double
          nullable: true
        closingDay:
          type: integer
          minimum: 1
          maximum: 31
          nullable: true
        dueDay:
          type: integer
          minimum: 1
          maximum: 31
          nullable: true

    CreditCardDetailsResponse:
      type: object
      required: [closingDay, dueDay]
      properties:
        brand:
          oneOf:
            - $ref: '#/components/schemas/CardBrand'
          nullable: true
        lastFourDigits:
          type: string
          nullable: true
        limitAmount:
          type: number
          format: double
          nullable: true
        closingDay:
          type: integer
        dueDay:
          type: integer

    AccountCreateRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
          maxLength: 100
        type:
          $ref: '#/components/schemas/AccountType'
        color:
          type: string
          pattern: '^#([A-Fa-f0-9]{6})$'
          nullable: true
        icon:
          type: string
          nullable: true
        countInLiquidBalance:
          type: boolean
          nullable: true
        countInNetWorth:
          type: boolean
          nullable: true
        creditCardDetails:
          oneOf:
            - $ref: '#/components/schemas/CreditCardDetailsRequest'
          nullable: true

    AccountUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
          nullable: true
        color:
          type: string
          pattern: '^#([A-Fa-f0-9]{6})$'
          nullable: true
        icon:
          type: string
          nullable: true
        countInLiquidBalance:
          type: boolean
          nullable: true
        countInNetWorth:
          type: boolean
          nullable: true
        creditCardDetails:
          oneOf:
            - $ref: '#/components/schemas/CreditCardDetailsRequest'
          nullable: true

    AccountResponse:
      type: object
      required: [id, name, type, countInLiquidBalance, countInNetWorth, active, balance]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          $ref: '#/components/schemas/AccountType'
        color:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        countInLiquidBalance:
          type: boolean
        countInNetWorth:
          type: boolean
        active:
          type: boolean
        balance:
          type: number
          format: double
        creditCardDetails:
          oneOf:
            - $ref: '#/components/schemas/CreditCardDetailsResponse'
          nullable: true

paths:

  # --- Auth (sem autenticação) ---

  /auth/login:
    post:
      tags: [auth]
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDTO'
      responses:
        '200':
          description: Token JWT gerado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponseDTO'
        '401':
          description: Credenciais inválidas

  /auth/register:
    post:
      tags: [auth]
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantRegistrationDTO'
      responses:
        '201':
          description: Tenant e usuário admin criados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponseDTO'

  # --- Categories ---

  /api/categories:
    get:
      tags: [categories]
      operationId: listCategories
      parameters:
        - name: includeArchived
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Lista de categorias raiz com filhos aninhados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryResponseDTO'
    post:
      tags: [categories]
      operationId: createCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreateDTO'
      responses:
        '201':
          description: Categoria criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponseDTO'

  /api/categories/{id}:
    get:
      tags: [categories]
      operationId: getCategory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Categoria encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponseDTO'
        '404':
          description: Categoria não encontrada
    put:
      tags: [categories]
      operationId: updateCategory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreateDTO'
      responses:
        '200':
          description: Categoria atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponseDTO'
        '404':
          description: Categoria não encontrada
    delete:
      tags: [categories]
      operationId: deleteCategory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Categoria removida (soft delete)
        '404':
          description: Categoria não encontrada
        '409':
          description: Categoria possui transações — frontend deve exibir modal de escolha (body contém transactionCount)

  /api/categories/{id}/archive:
    post:
      tags: [categories]
      operationId: archiveCategory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryArchiveRequest'
      responses:
        '204':
          description: Categoria arquivada (com ou sem reassociação de transações)
        '404':
          description: Categoria ou categoria destino não encontrada
        '400':
          description: targetCategoryId inválido (descendente da categoria sendo arquivada)

  # --- Transactions ---

  /api/transactions:
    get:
      tags: [transactions]
      operationId: listTransactions
      parameters:
        - name: invoiceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: accountIds
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              format: uuid
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TransactionStatus'
        - name: type
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TransactionType'
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Lista de transações do tenant
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransactionResponseDTO'
    post:
      tags: [transactions]
      operationId: createTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionRequestDTO'
      responses:
        '201':
          description: Transação(ões) criada(s) — múltiplas em caso de parcelamento
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransactionResponseDTO'

  /api/transactions/{id}:
    get:
      tags: [transactions]
      operationId: getTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Transação encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponseDTO'
        '404':
          description: Transação não encontrada
    put:
      tags: [transactions]
      operationId: updateTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionUpdateDTO'
      responses:
        '200':
          description: Transação atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponseDTO'
        '404':
          description: Transação não encontrada
    delete:
      tags: [transactions]
      operationId: deleteTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: scope
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/DeleteInstallmentScope'
      responses:
        '200':
          description: Resultado da exclusão
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteInstallmentResultDTO'
        '404':
          description: Transação não encontrada

  # --- Dashboard ---

  /api/dashboard/summary:
    get:
      tags: [dashboard]
      operationId: getDashboardSummary
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
          example: "2026-05"
          description: Mês no formato yyyy-MM
      responses:
        '200':
          description: Resumo financeiro do período
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummaryDTO'
        '400':
          description: Formato do parâmetro month inválido

  # --- Accounts ---

  /api/accounts:
    get:
      tags: [accounts]
      operationId: listAccounts
      responses:
        '200':
          description: Lista de contas ativas do tenant (com saldo calculado)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountResponse'
    post:
      tags: [accounts]
      operationId: createAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreateRequest'
      responses:
        '201':
          description: Conta criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'

  /api/accounts/{id}:
    get:
      tags: [accounts]
      operationId: getAccount
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Conta encontrada com saldo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '404':
          description: Conta não encontrada
    put:
      tags: [accounts]
      operationId: updateAccount
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdateRequest'
      responses:
        '200':
          description: Conta atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '404':
          description: Conta não encontrada
    delete:
      tags: [accounts]
      operationId: deleteAccount
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Conta arquivada (soft-delete)
        '404':
          description: Conta não encontrada

  # --- Transfers ---

  /api/transfers:
    post:
      tags: [transfers]
      operationId: createTransfer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
      responses:
        '201':
          description: Transferência criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferResponse'
        '400':
          description: Contas iguais ou dados inválidos

  /api/transfers/{transferId}:
    delete:
      tags: [transfers]
      operationId: deleteTransfer
      parameters:
        - name: transferId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Transferência excluída
        '404':
          description: Transferência não encontrada

  /api/installment-groups:
    get:
      tags: [installment-groups]
      operationId: listInstallmentGroups
      responses:
        '200':
          description: Lista de grupos de parcelamento
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InstallmentGroupResponseDTO'

  /api/installment-groups/{id}:
    get:
      tags: [installment-groups]
      operationId: getInstallmentGroup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Detalhe do grupo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallmentGroupResponseDTO'
        '404':
          description: Grupo não encontrado
    delete:
      tags: [installment-groups]
      operationId: deleteInstallmentGroup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Resultado da exclusão
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteInstallmentResultDTO'
        '404':
          description: Grupo não encontrado
    patch:
      tags: [installment-groups]
      operationId: patchInstallmentGroup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstallmentGroupPatchDTO'
      responses:
        '200':
          description: Grupo atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallmentGroupResponseDTO'

  # --- Invoices ---

  /api/invoices:
    get:
      tags: [invoices]
      operationId: listInvoices
      parameters:
        - name: accountId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de faturas da conta
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InvoiceResponseDTO'

  /api/invoices/{id}:
    get:
      tags: [invoices]
      operationId: getInvoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Detalhe da fatura
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceResponseDTO'

  /api/invoices/{id}/close:
    post:
      tags: [invoices]
      operationId: closeInvoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Fatura fechada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceResponseDTO'

  /api/invoices/{id}/pay:
    post:
      tags: [invoices]
      operationId: payInvoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoicePayDTO'
      responses:
        '200':
          description: Fatura paga
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceResponseDTO'
