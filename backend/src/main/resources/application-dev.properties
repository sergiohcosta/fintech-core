# Banco local (Docker Compose).
# Quando neon.enabled=true e application-local.properties existir no classpath,
# o NeonFallbackEnvironmentPostProcessor tenta sobrescrever estas propriedades com
# as credenciais da Neon no startup. Defina false para usar sempre o banco local.
neon.enabled=false
spring.datasource.url=jdbc:postgresql://localhost:5432/fintech
spring.datasource.username=admin
spring.datasource.password=secret

# Debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging — padrão legível em dev, com requestId/userId do MDC visíveis
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%X{requestId:--}][%X{userId:--}] %logger{36} - %msg%n
logging.level.com.fintech=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN

# DevTools — reinicialização automática em dev
spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s

# JWT (valor fixo apenas para dev — nunca usar em prod)
api.security.token.secret=dev-secret-key-not-for-production

# CORS — aceita somente o frontend local
cors.allowed-origins=http://localhost:4200

# Flyway seed — carregado apenas no perfil dev
spring.flyway.locations=classpath:db/migration,classpath:db/seed
