spring.application.name=fintech-api

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/fintech
spring.datasource.username=admin
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# IMPORTANTE: Desligamos o ddl-auto pois usaremos Flyway para criar tabelas
spring.jpa.hibernate.ddl-auto=validate
# DevTools Configuration for WSL/VSCode Auto-Restart
spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s
