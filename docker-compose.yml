services:
  postgres:
    image: postgres:16-alpine
    container_name: fintech-postgres
    environment:
      - POSTGRES_DB=fintech
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret
    ports:
      - "5432:5432"
    volumes:
      - ./.docker/postgres-data:/var/lib/postgresql/data
    networks:
      - fintech-net
    restart: unless-stopped

  # Opcional: Interface visual web para gerenciar o banco (útil para debug rápido)
  pgadmin:
    image: dpage/pgadmin4
    container_name: fintech-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fintech.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - fintech-net

networks:
  fintech-net:
    driver: bridge