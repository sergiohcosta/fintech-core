<div class='page-container'>
  <header class='page-header'>
    <div>
      <h1>Categorias</h1>
      <p class='subtitle'>Gerencie a hierarquia de suas categorias financeiras</p>
    </div>
    <button mat-flat-button color='primary' routerLink='/categories/new'>
      <mat-icon>add</mat-icon>
      Nova Categoria
    </button>
  </header>

  <div class='table-container mat-elevation-z2'>
    <table mat-table [dataSource]='categories()'>
      
      <!-- Nome com Indentação Hierárquica -->
      <ng-container matColumnDef='name'>
        <th mat-header-cell *matHeaderCellDef> Nome / Hierarquia </th>
        <td mat-cell *matCellDef='let cat'>
          <div [style.padding-left.px]='cat.level * 32' style='display: flex; align-items: center;'>
            @if (cat.level > 0) {
              <mat-icon style='font-size: 18px; width: 18px; height: 18px; margin-right: 8px; color: #bdbdbd;'>
                subdirectory_arrow_right
              </mat-icon>
            }
            <div class='color-dot' [style.background-color]='cat.color'
                 style='width: 12px; height: 12px; margin-right: 8px; box-shadow: none; flex-shrink: 0;'>
            </div>
            <mat-icon [style.color]='cat.color'
                      style='font-size: 18px; width: 18px; height: 18px; margin-right: 8px; flex-shrink: 0;'>
              {{ cat.icon }}
            </mat-icon>
            <span [style.font-weight]='cat.level === 0 ? "500" : "400"'
                  [style.font-size.rem]='cat.level === 0 ? 1 : 0.9'>
              {{ cat.name }}
            </span>
          </div>
        </td>
      </ng-container>

<ng-container matColumnDef='actions'>
        <th mat-header-cell *matHeaderCellDef> </th>
        <td mat-cell *matCellDef='let cat'>
          <div class='actions-group'>
            <button mat-icon-button color='primary' (click)='onEdit(cat)' matTooltip='Editar'>
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color='warn' (click)='onDelete(cat)' matTooltip='Excluir'>
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef='displayedColumns'></tr>
      <tr mat-row *matRowDef='let row; columns: displayedColumns;' 
          class='element-row'
          [style.background-color]='row.level === 0 ? "rgba(0,0,0,0.01)" : "transparent"'>
      </tr>

      <tr class='mat-row' *matNoDataRow>
        <td class='mat-cell empty-state' colspan='2'>
          <mat-icon>category</mat-icon>
          <p>Nenhuma categoria encontrada.</p>
        </td>
      </tr>

    </table>
  </div>
</div>
