<div class="page-container">

  <header class="page-header">
    <div>
      <h1>Meus Cartões</h1>
      <p class="subtitle">Gerencie seus limites e datas de vencimento</p>
    </div>

    <button mat-flat-button color="primary" routerLink="/credit-cards/new">
      <mat-icon>add</mat-icon>
      Novo Cartão
    </button>
  </header>

  <div class="table-container mat-elevation-z2">

    <table mat-table [dataSource]="cards()">

      <ng-container matColumnDef="color">
        <th mat-header-cell *matHeaderCellDef> Cor </th>
        <td mat-cell *matCellDef="let card">
          <div class="color-dot" [style.background-color]="card.color" [title]="card.color">
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Cartão </th>
        <td mat-cell *matCellDef="let card">
          <div class="card-info">
            <span class="card-name">{{ card.name }}</span>
            <span class="card-digits">•••• {{ card.lastFourDigits }}</span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="brand">
        <th mat-header-cell *matHeaderCellDef> Bandeira </th>
        <td mat-cell *matCellDef="let card">
          <span class="brand-badge">{{ card.brand }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="limit">
        <th mat-header-cell *matHeaderCellDef> Limite Atual </th>
        <td mat-cell *matCellDef="let card" class="limit-cell">
          {{ card.limitAmount | currency:'BRL' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="closingDay">
        <th mat-header-cell *matHeaderCellDef> Fechamento </th>
        <td mat-cell *matCellDef="let card">
          Dia {{ card.closingDay }}
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> </th>
        <td mat-cell *matCellDef="let card">
          <div class="actions-group">
            <button mat-icon-button color="primary" (click)="onEdit(card)" matTooltip="Editar">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="onDelete(card)" matTooltip="Excluir">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="element-row"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-state" colspan="6">
          <mat-icon>credit_card_off</mat-icon>
          <p>Você ainda não possui cartões cadastrados.</p>
        </td>
      </tr>

    </table>
  </div>
</div>
