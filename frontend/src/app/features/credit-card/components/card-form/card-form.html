<div class="form-container mat-elevation-z4">
    <header>
        <h1>{{ isEditMode() ? 'Editar Cartão' : 'Novo Cartão' }}</h1>
        <p>Preencha os dados abaixo</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <div class="grid-layout">

            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Nome do Cartão (Apelido)</mat-label>
                <input matInput formControlName="name" placeholder="Ex: Nubank Principal">
                <mat-error *ngIf="form.get('name')?.hasError('required')">Obrigatório</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Bandeira</mat-label>
                <mat-select formControlName="brand">
                    <mat-option *ngFor="let b of brands" [value]="b">{{ b }}</mat-option>
                </mat-select>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Cor de Identificação</mat-label>
                <input matInput type="color" formControlName="color" style="height: 40px; cursor: pointer;">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Últimos 4 dígitos</mat-label>
                <input matInput formControlName="lastFourDigits" maxlength="4" placeholder="1234">
                <mat-error>Exatamente 4 números</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Limite (R$)</mat-label>
                <input matInput type="number" formControlName="limitAmount" min="0">
                <span matTextPrefix>R$&nbsp;</span>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Dia do Fechamento</mat-label>
                <input matInput type="number" formControlName="closingDay" min="1" max="31">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Dia do Vencimento</mat-label>
                <input matInput type="number" formControlName="dueDay" min="1" max="31">
            </mat-form-field>

        </div>

        <div class="actions">
            <button mat-button type="button" routerLink="/credit-cards">Cancelar</button>
            <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">
                {{ isEditMode() ? 'Salvar Alterações' : 'Criar Cartão' }}
            </button>
        </div>

    </form>
</div>
